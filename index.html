<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>ООО "Тестовая компания"</title>
    <meta name="description" content="Добро пожаловать на сайт ООО "Тестовая компания"! Здесь я делюсь своими проектами, заметками о программировании и полезными ресурсами.">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <img src="logo.png" alt="Логотип ООО &quot;Тестовая компания&quot;" width="32">
    <h1>Это тестовая страница ООО "Тестовая компания"</h1>
    <h2>Регистрация</h2>
    <form id="registrationForm" action="https://formspree.io/f/xaqkkvnp" method="POST">
    <div class="form-group">
     <label for="name">Имя:</label>
     <input type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
     <label for="email">Email:</label>
     <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
     <label for="password">Пароль:</label>
     <input type="password" id="password" name="password" required>
    </div>
    <button type="submit">Зарегистрироваться</button>
    </form>
    <div id="message"></div>

    <script>
       document.getElementById('registrationForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const messageDiv = document.getElementById('message');

  try {
    // Отправляем данные на Formspree
    const response = await fetch(this.action, {
      method: 'POST',
      body: formData,
      headers: {
        'Accept': 'application/json'
      }
    });

    if (response.ok) {
      // Генерируем код подтверждения
      const confirmationCode = Math.floor(100000 + Math.random() * 900000);

      // Отправляем код на email пользователя (через Formspree)
      const codeData = new FormData();
      codeData.append('email', formData.get('email'));
      codeData.append('subject', 'Код подтверждения регистрации');
      codeData.append('message', `Ваш код подтверждения: ${confirmationCode}`);

      await fetch('https://formspree.io/f/your-code-form-id', {
        method: 'POST',
        body: codeData,
        headers: {
          'Accept': 'application/json'
        }
      });

      showMessage('Код подтверждения отправлен на ваш email.', 'success');
    } else {
      throw new Error('Ошибка отправки формы');
    }
  } catch (error) {
    showMessage('Ошибка: ' + error.message, 'error');
  }
});

function showMessage(text, type) {
  const messageDiv = document.getElementById('message');
  messageDiv.textContent = text;
  messageDiv.className = `message ${type}`;
}
    </script>
</body>
</html>
