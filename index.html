<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>ООО "Тестовая компания"</title>
    <meta name="description" content="Добро пожаловать на сайт ООО "Тестовая компания"!">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <img src="logo.png" alt="Логотип ООО &quot;Тестовая компания&quot;" width="32">
    <h1>Это тестовая страница ООО "Тестовая компания"</h1>
    <h2>Регистрация</h2>
    <form id="registrationForm" action="https://formspree.io/f/xaqkkvnp" method="POST">
    <div class="form-group">
     <label for="name">Имя:</label>
     <input type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
     <label for="email">Email:</label>
     <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
     <label for="password">Пароль:</label>
     <input type="password" id="password" name="password" required>
    </div>
    <button type="submit">Зарегистрироваться</button>
    </form>
    <div id="message"></div>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>    
    <script type="text/javascript">   
       showMessage('Вошли в скрипт ', 'error');
       emailjs.init('cGeECipVE0nzzgalq');
       document.getElementById('registrationForm').addEventListener('submit', function(e) {
              e.preventDefault();
              const formData = new FormData(this);
              const email = formData.get('email');
              const name = formData.get('name');
              const code = Math.floor(100000 + Math.random() * 900000);

  emailjs.send('Gmail', 'YOUR_TEMPLATE_ID', {
    to_email: email,
    from_name: 'ООО Тестовая компания',
    subject: 'Код подтверждения',
    message: `Здравствуйте, ${name}! Ваш код: ${code}`
  }).then(function(response) {
    showMessage('Код отправлен на email.', 'success');
  }, function(error) {
    showMessage('Ошибка отправки: ' + error.text, 'error');
  });
})
    </script>
</body>
</html>
