<h2>Регистрация с подтверждением email</h2>
<form id="registrationForm">
  <div class="form-group">
    <label for="name">Имя:</label>
    <input type="text" id="name" name="name" required>
  </div>
  <div class="form-group">
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
  </div>
  <div class="form-group">
    <label for="password">Пароль:</label>
    <input type="password" id="password" name="password" required>
  </div>

  <button type="button" id="sendCodeBtn">Получить код подтверждения</button>

  <div class="form-group" id="codeField" style="display: none;">
    <label for="confirmationCode">Код подтверждения (6 цифр):</label>
    <input type="text" id="confirmationCode" name="confirmationCode" maxlength="6" placeholder="123456" required>
  </div>

  <!-- Кнопка изначально отключена -->
  <button type="submit" id="registerBtn" disabled style="display: none; opacity: 0.6; cursor: not-allowed;">Зарегистрироваться</button>
</form>
<div id="message"></div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
emailjs.init('YOUR_PUBLIC_KEY');

let generatedCode = null;

// Обработчик кнопки «Получить код»
document.getElementById('sendCodeBtn').addEventListener('click', function() {
  const email = document.getElementById('email').value;
  const messageDiv = document.getElementById('message');


  if (!email) {
    showMessage('Введите email для получения кода.', 'error');
    return;
  }

  generatedCode = Math.floor(100000 + Math.random() * 900000);

  emailjs.send(
    'YOUR_SERVICE_ID',
    'direct',
    {
      to_email: email,
      subject: 'Код подтверждения регистрации',
      message: `Здравствуйте! Ваш код подтверждения: ${generatedCode}`
    }
  ).then(function(response) {
    document.getElementById('codeField').style.display = 'block';
    document.getElementById('registerBtn').style.display = 'block';
    showMessage('Код отправлен на ваш email.', 'success');
  }, function(error) {
    showMessage('Ошибка отправки кода: ' + error.text, 'error');
    console.error('Ошибка EmailJS:', error);
  });
});

// Активируем/деактивируем кнопку при вводе кода
document.getElementById('confirmationCode').addEventListener('input', function() {
  const code = this.value.trim();
  const registerBtn = document.getElementById('registerBtn');

  if (/^\d{6}$/.test(code)) {
    registerBtn.disabled = false;
    registerBtn.style.opacity = '1';
    registerBtn.style.cursor = 'pointer';
  } else {
    registerBtn.disabled = true;
    registerBtn.style.opacity = '0.6';
    registerBtn.style.cursor = 'not-allowed';
  }
});

// Обработчик формы регистрации
document.getElementById('registrationForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const name = formData.get('name');
  const email = formData.get('email');
  const password = formData.get('password');
  const userCode = formData.get('confirmationCode');

  if (!name || !email || !password || !userCode) {
    showMessage('Заполните все поля.', 'error');
    return;
  }

  if (password.length < 6) {
    showMessage('Пароль должен быть минимум 6 символов.', 'error');
    return;
  }

  if (parseInt(userCode) !== generatedCode) {
    showMessage('Неверный код подтверждения.', 'error');
    return;
  }

  showMessage('Регистрация успешна! Добро пожаловать, ' + name + '!', 'success');
  console.log('Пользователь зарегистрирован:', { name, email });
});

function showMessage(text, type) {
  const messageDiv = document.getElementById('message');
  messageDiv.textContent = text;
  messageDiv.className = `message ${type}`;
}
</script>
